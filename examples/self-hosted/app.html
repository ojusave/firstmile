<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your app (self-hosted example)</title>
  <style>
    body { font: 16px/1.6 system-ui, sans-serif; max-width: 480px; margin: 48px auto; padding: 0 16px; }
    label { display: block; margin: 14px 0 4px; font-weight: 600; }
    input { width: 100%; padding: 10px; font-size: 15px; }
    button { margin-top: 20px; padding: 10px 18px; font-size: 15px; cursor: pointer; }
    .step { display: none; }
    .step.active { display: block; }
    small { color: #666; }
  </style>
</head>
<body>
  <h1>Sign up</h1>
  <small>This app runs on :5173. It sends events to your collector on :8787.</small>

  <form class="step active" id="step-account" data-route="/signup">
    <label for="email">Work email</label>
    <input id="email" name="email" type="email" required />
    <button type="submit">Continue</button>
  </form>

  <form class="step" id="step-project" data-route="/projects/new">
    <label for="project">Project name</label>
    <input id="project" name="project" type="text" required />
    <button type="submit">Create</button>
  </form>

  <div class="step" id="step-done" data-route="/success"><h2>Done.</h2></div>

  <script src="/calibrate.global.js"></script>
  <script>
    // endpoint points at YOUR collector, not a Calibrate cloud.
    const fm = calibrate({ app: "self-hosted-demo", endpoint: "http://localhost:8787", debug: true });

    const steps = ["step-account", "step-project", "step-done"];
    let i = 0;
    function show(next) {
      document.getElementById(steps[i]).classList.remove("active");
      i = next;
      const el = document.getElementById(steps[i]);
      el.classList.add("active");
      history.pushState({}, "", el.dataset.route);
      if (steps[i] === "step-done") fm.shipped();
    }
    document.getElementById("step-account").addEventListener("submit", (e) => { e.preventDefault(); show(1); });
    document.getElementById("step-project").addEventListener("submit", (e) => { e.preventDefault(); show(2); });
  </script>
</body>
</html>
