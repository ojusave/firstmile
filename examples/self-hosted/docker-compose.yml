# Shows the self-hosted model end to end: your app on one origin, your collector on
# another, your data on a disk you own. There is no Firstmile cloud in this picture.
services:
  # This is YOUR collector, running on YOUR infrastructure.
  collector:
    build:
      context: ../..
      dockerfile: packages/collector/Dockerfile
    ports:
      - "8787:8787"
    environment:
      # The app runs on a different origin, so it must be allowed to post here.
      ALLOWED_ORIGINS: "http://localhost:5173"
      DATA_DIR: /data
    volumes:
      # YOUR data lands here, on a disk you control. Inspect ./data after a run.
      - ./data:/data

  # A stand-in for the developer's web app. In real life this is your product.
  app:
    image: nginx:alpine
    ports:
      - "5173:80"
    volumes:
      - ./app.html:/usr/share/nginx/html/index.html:ro
      - ../../packages/browser/dist/firstmile.global.js:/usr/share/nginx/html/firstmile.global.js:ro
    depends_on:
      - collector
