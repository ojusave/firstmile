<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calibrate plain-HTML example</title>
  <style>
    body { font: 16px/1.6 system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
    label { display: block; margin: 14px 0 4px; font-weight: 600; }
    input { width: 100%; padding: 10px; font-size: 15px; }
    button { margin-top: 20px; padding: 10px 18px; font-size: 15px; cursor: pointer; }
    .step { display: none; }
    .step.active { display: block; }
  </style>
</head>
<body>
  <h1>Sign up</h1>

  <!-- Autocapture watches these forms and route changes with zero extra code. -->
  <form class="step active" id="step-account" data-route="/signup">
    <label for="email">Work email</label>
    <input id="email" name="email" type="email" required />
    <label for="company">Company</label>
    <input id="company" name="company" type="text" required />
    <button type="submit">Continue</button>
  </form>

  <form class="step" id="step-project" data-route="/projects/new">
    <label for="project">Project name</label>
    <input id="project" name="project" type="text" required />
    <button type="submit">Create project</button>
  </form>

  <div class="step" id="step-done" data-route="/success">
    <h2>You are all set.</h2>
  </div>

  <!--
    One script tag. Swap the src for the CDN build in production:
    <script src="https://cdn.jsdelivr.net/npm/usecalibrate"></script>
  -->
  <script src="../../packages/browser/dist/calibrate.global.js"></script>
  <script>
    const fm = calibrate({
      app: "plain-html-demo",
      endpoint: "http://localhost:8787",
    });

    // This demo has no real router, so it nudges the route for autocapture. A real SPA
    // would not need this: calibrate observes history changes on its own.
    const steps = ["step-account", "step-project", "step-done"];
    let index = 0;
    function show(next) {
      document.getElementById(steps[index]).classList.remove("active");
      index = next;
      const el = document.getElementById(steps[index]);
      el.classList.add("active");
      history.pushState({}, "", el.dataset.route);
      if (steps[index] === "step-done") fm.shipped();
    }
    document.getElementById("step-account").addEventListener("submit", (e) => { e.preventDefault(); show(1); });
    document.getElementById("step-project").addEventListener("submit", (e) => { e.preventDefault(); show(2); });
  </script>
</body>
</html>
